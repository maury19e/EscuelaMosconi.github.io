<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <!-- Permite que la página sea responsive y se adapte al tamaño de la pantalla -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" href="img/ChatGPT Image 16 jun 2026, 00_15_38.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="img/ChatGPT Image 16 jun 2026, 00_15_38.png">
</head>

<body id="fondo_inicial">
<div class="login-contenedor">

    <div class="login-tarjeta">

        <img src="img/person-circle.svg">

        <h2>Iniciar Sesión</h2>

        <form id="login">

            <label>Usuario</label>
            <input type="text" id="usuario" required>

            <label>Contraseña</label>
            <input type="password" id="clave" required>

            <button type="submit">
                Ingresar
            </button>

            <p id="error" class="error">
                Usuario o contraseña incorrectos
            </p>

        </form>

    </div>

</div>

</body>

<script src="scripts.js"></script>

</html>
